<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Million Mart - Product Gallery</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  : root{
    --bg:#120d1e;--bg2:#1c1530;--bg3:#251e3a;
    --accent:#e91e8c;--accent2:#c2185b;
    --text:#f0eaf8;--muted:#9988bb;--border:#2e2448;--card:#1c1530;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
  .logo{height:42px;display:flex;align-items:center;flex-shrink:0}
  .logo img{height:42px;width:auto;object-fit:contain}
  .search-wrap{flex:1;position:relative}
  .search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:9px 16px 9px 38px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
  .search:focus{border-color:var(--accent)}
  .search::placeholder{color:var(--muted)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.5;pointer-events:none;font-size:16px}
  .topbtns{display:flex;align-items:center;gap:8px}
  .resale-btn{background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .resale-btn:hover{background:var(--accent);color:#fff}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:4px;display:flex;align-items:center;justify-content:center;transition:color 0.2s;position:relative}
  .icon-btn:hover{color:var(--text)}
  .cart-count{position:absolute;top:-2px;right:-2px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center}
  .cats{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;transition:transform 0.15s}
  .cat:hover{transform:scale(1.05)}
  .cat-circle{width:58px;height:58px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;transition:border-color 0.2s,background 0.2s}
  .cat.active .cat-circle{border-color:var(--accent);background:#3d0e2a}
  .cat-label{font-size:11px;color:var(--muted);text-align:center;max-width:64px;line-height:1.3}
  .cat.active .cat-label{color:var(--accent)}
  .toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
  .result-count{font-size:13px;color:var(--muted)}
  .sort-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:13px;outline:none;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:1px;background:var(--border)}
  .card{background:var(--card);cursor:pointer;overflow:hidden;transition:background 0.15s}
  .card:hover{background:var(--bg3)}
  .card-img-wrap{position:relative;width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .card-badge{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;z-index:1}
  .card-wishlist{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border:none;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;opacity:0;transition:opacity 0.2s;z-index:1}
  .card:hover .card-wishlist{opacity:1}
  .card-wishlist.liked{opacity:1;color:var(--accent)}
  .card-body{padding:10px 12px 14px}
  .card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-code{font-size:11px;color:var(--muted);margin-bottom:6px}
  .card-price{font-size:14px;font-weight:700;color:var(--accent)}
  .card-add{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:background 0.2s;opacity:0}
  .card:hover .card-add{opacity:1}
  .card-add:hover{background:var(--accent2)}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;z-index:1}
  .modal-close:hover{color:var(--text)}
  .modal-img{width:100%;aspect-ratio:4/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:80px;border-radius:16px 16px 0 0;overflow:hidden;position:relative}
  .modal-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .modal-body{padding:20px}
  .modal-code{font-size:12px;color:var(--muted);margin-bottom:4px}
  .modal-name{font-size:22px;font-weight:700;margin-bottom:8px}
  .modal-price{font-size:26px;font-weight:800;color:var(--accent);margin-bottom:16px}
  .modal-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px}
  .modal-sizes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .size-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all 0.15s}
  .size-btn.selected,.size-btn:hover{border-color:var(--accent);color:var(--accent)}
  .modal-actions{display:flex;gap:10px}
  .btn-cart{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.2s}
  .btn-cart:hover{background:var(--accent2)}
  .btn-wish{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:13px 18px;font-size:18px;cursor:pointer}
  .btn-wish:hover{border-color:var(--accent)}
  .cart-drawer{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--bg2);border-left:1px solid var(--border);z-index:300;transform:translateX(100%);transition:transform 0.3s;display:flex;flex-direction:column}
  .cart-drawer.open{transform:translateX(0)}
  .cart-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .cart-header h3{font-size:16px;font-weight:700}
  .cart-items{flex:1;overflow-y:auto;padding:12px}
  .cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:10px;font-size:14px}
  .cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
  .cart-item-img{width:52px;height:52px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
  .cart-item-img img{width:100%;height:100%;object-fit:cover}
  .cart-item-info{flex:1;min-width:0}
  .cart-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cart-item-price{font-size:13px;color:var(--accent);margin-top:2px}
  .cart-item-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px;align-self:flex-start}
  .cart-footer{padding:16px;border-top:1px solid var(--border)}
  .cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px}
  .checkout-btn{width:100%;background:#25d366;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .checkout-btn:hover{background:#1da851}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250}
  .overlay.open{display:block}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2d2040;border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:10px;font-size:14px;z-index:500;transition:transform 0.3s;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;grid-column:1/-1}
  .no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
  .no-results span{font-size:48px;display:block;margin-bottom:12px}
  @media(max-width:480px){
    .resale-btn{display:none}
    .grid{grid-template-columns:repeat(2,1fr)}
    .cart-drawer{width:100%}
    .modal-bg{padding:0;align-items:flex-end}
    .modal{border-radius:16px 16px 0 0}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo"><img src="/logo.jpg" alt="Million Mart"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" id="searchInput" placeholder="Search designs..." autocomplete="off">
  </div>
  <div class="topbtns">
    <button class="resale-btn">Resale</button>
    <button class="icon-btn" onclick="toggleCart()" aria-label="Cart">
      🛒<span class="cart-count" id="cartCount">0</span>
    </button>
    <button class="icon-btn" aria-label="Account">👤</button>
  </div>
</header>

<nav class="cats" id="catBar">
  <div class="cat active" data-cat="All"><div class="cat-circle">⊞</div><span class="cat-label">All</span></div>
  <div class="cat" data-cat="Dress"><div class="cat-circle">👗</div><span class="cat-label">Dress</span></div>
  <div class="cat" data-cat="Tops"><div class="cat-circle">👚</div><span class="cat-label">Tops</span></div>
  <div class="cat" data-cat="T-Shirt"><div class="cat-circle">👕</div><span class="cat-label">T-Shirts</span></div>
  <div class="cat" data-cat="Pants"><div class="cat-circle">👖</div><span class="cat-label">Pants</span></div>
  <div class="cat" data-cat="Skirt"><div class="cat-circle">🩱</div><span class="cat-label">Skirt</span></div>
  <div class="cat" data-cat="Handbag"><div class="cat-circle">👜</div><span class="cat-label">Handbags</span></div>
  <div class="cat" data-cat="Jewellery"><div class="cat-circle">💍</div><span class="cat-label">Jewellery</span></div>
  <div class="cat" data-cat="Kids"><div class="cat-circle">🧒</div><span class="cat-label">Kids</span></div>
</nav>

<div class="toolbar">
  <span class="result-count" id="resultCount">Loading...</span>
  <select class="sort-select" id="sortSelect">
    <option value="default">Default</option>
    <option value="low">Price: Low → High</option>
    <option value="high">Price: High → Low</option>
    <option value="name">Name A–Z</option>
  </select>
</div>

<main class="grid" id="productGrid">
  <div class="loading">Loading products...</div>
</main>

<div class="modal-bg" id="modalBg" onclick="closeModalIfBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img" id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-code" id="modalCode"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)">SIZE</div>
      <div class="modal-sizes" id="modalSizes"></div>
      <div class="modal-actions">
        <button class="btn-cart" onclick="addFromModal()">Add to Cart</button>
        <button class="btn-wish" id="modalWishBtn" onclick="wishFromModal()">🤍</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3>🛒 My Cart</h3>
    <button class="icon-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">Rs. 0.00</span></div>
    <button class="checkout-btn" onclick="checkout()">🟢 Checkout via WhatsApp</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
let PRODUCTS = [];
let activeCategory = "All";
let searchQuery = "";
let sortOrder = "default";
let cart = [];
let wishlist = new Set();
let currentProduct = null;
let selectedSize = "";

// Load products from JSON
fetch('/products.json')
  .then(r => r.json())
  .then(data => {
    PRODUCTS = data;
    render();
  })
  .catch(() => {
    document.getElementById("productGrid").innerHTML = '<div class="no-results"><span>⚠️</span>Could not load products</div>';
  });

function getFiltered(){
  let list = [...PRODUCTS];
  if(activeCategory !== "All") list = list.filter(p => p.cat === activeCategory);
  if(searchQuery) list = list.filter(p => p.name.toLowerCase().includes(searchQuery) || p.code.toLowerCase().includes(searchQuery));
  if(sortOrder === "low") list.sort((a,b) => a.price - b.price);
  else if(sortOrder === "high") list.sort((a,b) => b.price - a.price);
  else if(sortOrder === "name") list.sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

function render(){
  const list = getFiltered();
  const grid = document.getElementById("productGrid");
  document.getElementById("resultCount").textContent = list.length + " products";
  if(!list.length){
    grid.innerHTML = '<div class="no-results"><span>🔍</span>No products found</div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const imgHtml = p.image
      ? `<img src="${p.image}" alt="${p.name}" loading="lazy"><span style="font-size:60px;position:relative;z-index:0;opacity:${p.image?0:1}">${p.emoji||'👗'}</span>`
      : `<span style="font-size:60px">${p.emoji||'👗'}</span>`;
    return `
    <div class="card" onclick="openModal(${p.id})">
      <div class="card-img-wrap">
        ${imgHtml}
        ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ""}
        <button class="card-wishlist ${wishlist.has(p.id)?'liked':''}" onclick="toggleWish(event,${p.id})">${wishlist.has(p.id)?'❤️':'🤍'}</button>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-code">${p.code}</div>
        <div class="card-price">Rs. ${Number(p.price).toLocaleString()}.00</div>
        <button class="card-add" onclick="quickAdd(event,${p.id})">+ Add to Cart</button>
      </div>
    </div>`;
  }).join("");
}

function openModal(id){
  currentProduct = PRODUCTS.find(p => p.id === id);
  selectedSize = "";
  const img = document.getElementById("modalImg");
  if(currentProduct.image){
    img.innerHTML = `<img src="${currentProduct.image}" alt="${currentProduct.name}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    img.innerHTML = `<span style="font-size:80px">${currentProduct.emoji||'👗'}</span>`;
  }
  document.getElementById("modalCode").textContent = currentProduct.code;
  document.getElementById("modalName").textContent = currentProduct.name;
  document.getElementById("modalPrice").textContent = "Rs. " + Number(currentProduct.price).toLocaleString() + ".00";
  document.getElementById("modalDesc").textContent = currentProduct.desc;
  const sizes = Array.isArray(currentProduct.sizes) ? currentProduct.sizes : (currentProduct.sizes||"S,M,L").split(",");
  document.getElementById("modalSizes").innerHTML = sizes.map(s =>
    `<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`
  ).join("");
  document.getElementById("modalWishBtn").textContent = wishlist.has(id) ? "❤️" : "🤍";
  document.getElementById("modalBg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function selectSize(s, btn){
  selectedSize = s;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function closeModal(){
  document.getElementById("modalBg").classList.remove("open");
  document.body.style.overflow = "";
}
function closeModalIfBg(e){ if(e.target === document.getElementById("modalBg")) closeModal(); }

function addFromModal(){
  const sizes = Array.isArray(currentProduct.sizes) ? currentProduct.sizes : [];
  if(!selectedSize && sizes.length > 1){ showToast("Please select a size!"); return; }
  addToCart(currentProduct, selectedSize || (sizes[0]||""));
  closeModal();
}

function wishFromModal(){
  toggleWish(null, currentProduct.id);
  document.getElementById("modalWishBtn").textContent = wishlist.has(currentProduct.id) ? "❤️" : "🤍";
}

function quickAdd(e, id){
  e.stopPropagation();
  const p = PRODUCTS.find(x => x.id === id);
  const sizes = Array.isArray(p.sizes) ? p.sizes : [];
  addToCart(p, sizes[0]||"");
}

function addToCart(p, size){
  cart.push({...p, size, cartId: Date.now()});
  updateCartUI();
  showToast("✓ " + p.name + " added to cart");
}

function toggleWish(e, id){
  if(e) e.stopPropagation();
  wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
  render();
}

function updateCartUI(){
  const count = cart.length;
  const el = document.getElementById("cartCount");
  el.textContent = count;
  el.style.display = count > 0 ? "flex" : "none";
  const items = document.getElementById("cartItems");
  if(!cart.length){
    items.innerHTML = '<div class="cart-empty"><span style="font-size:40px">🛒</span>Your cart is empty</div>';
    document.getElementById("cartTotal").textContent = "Rs. 0.00";
    return;
  }
  items.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">${item.image ? `<img src="${item.image}" alt="${item.name}">` : item.emoji||'👗'}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">Rs. ${Number(item.price).toLocaleString()}.00 · ${item.size}</div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.cartId})">✕</button>
    </div>
  `).join("");
  const total = cart.reduce((s,i) => s + Number(i.price), 0);
  document.getElementById("cartTotal").textContent = "Rs. " + total.toLocaleString() + ".00";
}

function removeFromCart(cartId){
  cart = cart.filter(i => i.cartId !== cartId);
  updateCartUI();
}

function toggleCart(){
  document.getElementById("cartDrawer").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
  document.body.style.overflow = document.getElementById("cartDrawer").classList.contains("open") ? "hidden" : "";
}

function checkout(){
  if(!cart.length){ showToast("Cart is empty!"); return; }
  const lines = cart.map(i => `• ${i.name} (${i.code}) - Size: ${i.size} - Rs.${Number(i.price).toLocaleString()}`).join("\n");
  const total = cart.reduce((s,i) => s + Number(i.price), 0);
  const msg = encodeURIComponent("Hello! I'd like to order:\n\n" + lines + "\n\nTotal: Rs." + total.toLocaleString());
  window.open("https://wa.me/?text=" + msg, "_blank");
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

document.getElementById("catBar").addEventListener("click", e => {
  const cat = e.target.closest(".cat");
  if(!cat) return;
  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  cat.classList.add("active");
  activeCategory = cat.dataset.cat;
  render();
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

document.getElementById("sortSelect").addEventListener("change", e => {
  sortOrder = e.target.value;
  render();
});

document.addEventListener("keydown", e => { if(e.key === "Escape") closeModal(); });

updateCartUI();
</script>
</body>
</html>
